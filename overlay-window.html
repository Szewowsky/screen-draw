<!doctype html>
<html lang="en" class="no-background">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: https:; font-src 'self' data: file:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; media-src 'self' data: blob: file:; worker-src 'self' blob:; frame-src 'self' blob: data:"
    />
    <title>Screen Draw Overlay</title>
    <script>
      if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <style>
      html,
      body,
      #root {
        background: transparent;
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Preload is injected by the native layer via webPreferences.preload -->
    <script type="module" src="./renderer/overlay/index.tsx"></script>
  </body>
</html>
